apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-service-registry-app
  labels:
    app: my-service-registry-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-service-registry-app
  template:
    metadata:
      labels:
        app: my-service-registry-app
    spec:
      containers:
        - name: my-service-registry-app-container
          image: a96abhinav/my-service-registry-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8761
      imagePullSecrets:
        - name: my-docker-registry-key
---
apiVersion: v1
kind: Service
metadata:
  name: my-service-registry-app-service
spec:
  selector:
    app: my-service-registry-app
  ports:
    - protocol: TCP
      port: 8761
      targetPort: 8761
  type: LoadBalancer
