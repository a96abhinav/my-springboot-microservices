version: '3.8'

networks:
  my-app-network:
    driver: bridge

services:
  service-registry:
    build: ./my-service-registry
    container_name: service-registry
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 2s
      retries: 5
      start_period: 10s
    networks:
      - my-app-network

  config-server:
    build: ./my-config-server
    container_name: config-server
    depends_on:
      service-registry:
        condition: service_healthy
    ports:
      - "8888:8888"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka/
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 2s
      retries: 5
      start_period: 10s
    networks:
      - my-app-network

  api-gateway:
    build: ./my-api-gateway
    container_name: api-gateway
    depends_on:
      config-server:
        condition: service_healthy
      service-registry:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka/
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - my-app-network

  springboot-app:
    build: ./my-springboot-app
    container_name: springboot-app
    depends_on:
      config-server:
        condition: service_healthy
      service-registry:
        condition: service_healthy
    ports:
      - "8085:8085"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-registry:8761/eureka/
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - my-app-network