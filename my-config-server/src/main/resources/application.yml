spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: git@github.com:a96abhinav/my-cloud-config-repository.git
          default-label: dev
          timeout: 5
eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
#      Added below dependency to connect to eureka server in kubernetes containerized env
#      defaultZone: ${EUREKA_URI:http://service-registry:8761/eureka}
  instance:
    preferIpAddress: true

server:
 port: 8888

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always