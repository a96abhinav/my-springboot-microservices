spring:
 datasource:
  myspringappdb:
   driver-class-name: com.mysql.cj.jdbc.Driver
   url: jdbc:mysql://localhost:3306/myspringappdb?useSSL=true&serverTimezone=UTC
   username: root
   password: root
  tomcat:
   initial-size: 15
   max-wait: 20000
   max-active: 50
   max-idle: 15
   min-idle: 8
   default-auto-commit: true
 jpa:
  show-sql: true
  hibernate.ddl-auto: update
  hibernate.naming-strategy: org.hibernate.cfg.ImprovedNamingStrategy
  properties.hibernate.dialect: org.hibernate.dialect.MySQLDialect
  properties.hibernate.id.new_generator_mappings: false
  open-in-view: true
  properties:
   hibernate:
    show_sql: true
    format_sql: true
    type:
     descriptor:
      sql:
       BasicBinder: TRACE
 cache:
  type: redis
 redis:
  host: 127.0.0.1
  port: 6379
 data.redis.repositories.enabled: true
   
eureka:
 client:
  serviceUrl:
         defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
   #      Added below dependency to connect to eureka server in docker containerized env
#   defaultZone: ${EUREKA_URI:http://my-service-registry-app:8761/eureka}
 instance:
  preferIpAddress: true

springdoc:
 paths-to-match: /api/**
