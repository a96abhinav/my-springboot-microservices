# Root logger option
log4j.rootLogger=ALL,stdout,file

# Redirect log messages to console
log4j.appender.stdout=org.apache.log4j.ConsoleAppender
log4j.appender.stdout.Target=System.out
log4j.appender.stdout.layout=org.apache.log4j.PatternLayout
log4j.appender.stdout.layout.ConversionPattern=%d  %p       --- [  %t] %m %n

# Redirect log messages to a log file
log4j.appender.file=org.apache.log4j.FileAppender
log4j.appender.file.File=C:/Users/Dell/eclipse-remote-workspace/SpringBootRestAPI/log.out
#log4j.appender.file.MaxFileSize=50MB
#log4j.appender.file.MaxBackupIndex=10
log4j.appender.file.layout=org.apache.log4j.PatternLayout
log4j.appender.file.layout.ConversionPattern=%d  %p       --- [  %t] %m %n

#Pattern for reference
#%d(date) %p(log level) %t(thread name) %F(file name) %C(class name) %M(method name) %L(line number) %m(message) %n(new line)
#%d  %p       --- [  %t] %C              : %m %n